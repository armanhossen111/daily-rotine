<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Daily Recovery Checklist</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      background: rgba(2,6,23,0.9);
      backdrop-filter: blur(6px);
      padding: 14px 16px;
      border-bottom: 1px solid #1f2933;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    header p {
      margin: 4px 0 0;
      font-size: 0.75rem;
      color: var(--muted);
    }
    main {
      padding: 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    section {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }
    section h2 {
      font-size: 0.95rem;
      margin: 0 0 10px;
      font-weight: 600;
    }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1f2937;
      font-size: 0.9rem;
    }
    li:last-child { border-bottom: none; }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      accent-color: var(--accent);
    }
    .muted { color: var(--muted); font-size: 0.8rem; }
    .danger { color: var(--danger); }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.7rem;
      color: var(--muted);
    }
    button {
      background: #1f2937;
      border: 1px solid #374151;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 10px;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <header>
    <h1>🧠 My Daily Recovery</h1>
    <p id="today">Loading date…</p>
  </header>

  <main id="main-content">
  </main>

  <footer>
    Built only for you. No login. No tracking. Stored on this phone.
  </footer>

  <script>
    const mainContent = document.getElementById('main-content');
    const todayEl = document.getElementById('today');
    const today = new Date().toISOString().slice(0,10);
    todayEl.textContent = "Today: " + new Date().toDateString();

    // Week tracking
    const WEEK_KEY = 'recovery-week-start';
    const TODAY_KEY = 'recovery-today-status';

    if(!localStorage.getItem(WEEK_KEY)) {
        localStorage.setItem(WEEK_KEY, today);
    } else {
        const start = new Date(localStorage.getItem(WEEK_KEY));
        const diffDays = Math.floor((new Date(today) - start)/(1000*60*60*24));
        if(diffDays >= 7){
            localStorage.clear();
            localStorage.setItem(WEEK_KEY, today);
        }
    }

    // Ask user first time of day
    let todayStatus = localStorage.getItem(TODAY_KEY);
    if(!todayStatus){
        todayStatus = confirm("Is today an off day?") ? 'off' : 'work';
        localStorage.setItem(TODAY_KEY, todayStatus);
    }

    // Define routines
    const routines = {
      workDay: [
        {title: '🌅 Morning (6:00–6:50)', items: ['6:00 Wake up','6:05 Light exposure','6:15 Mobility','6:25 Fixed prep','6:50 Leave home']},
        {title: '🏭 Work Shift', items: ['7:00–9:30 Focus block','9:30 Micro-break','9:35–11:30 Design block','1:00 Reset','4:00 Fatigue break','6:30 Low-decision only']},
        {title: '🌇 Transition', items: ['7:00–7:20 Change clothes','Cool face wash','No phone']},
        {title: '🎮 Dopamine Window', items: ['8:30–9:30 PUBG / Social','Timer ON','Hard stop 9:30']},
        {title: '🌙 Sleep Wind-down', items: ['9:30–9:45 Dim lights','9:45–10:00 Stretch + breathing','10:00–10:30 Bed ritual','10:30 Sleep']}
      ],
      offDay: [
        {title: '🌅 Morning Off', items: ['7:00 Wake up','7:05 Light exposure','7:15 Stretch','7:25 Personal prep']},
        {title: '🧘 Relax / Hobby', items: ['Read / walk / meditate','Light exercise']},
        {title: '🎮 Leisure', items: ['PUBG / Social for 1 hour','Optional hobby']},
        {title: '🌙 Sleep Wind-down', items: ['21:00–21:15 Dim lights','21:15–21:30 Stretch + breathing','22:00 Sleep']}
      ]
    };

    const selectedRoutine = todayStatus === 'off' ? routines.offDay : routines.workDay;

    // Render sections
    selectedRoutine.forEach(section => {
      const sec = document.createElement('section');
      const h2 = document.createElement('h2');
      h2.textContent = section.title;
      sec.appendChild(h2);
      const ul = document.createElement('ul');
      section.items.forEach((item,i)=>{
        const li = document.createElement('li');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        const key = today + '_cb_' + section.title + '_' + i;
        const saved = localStorage.getItem(key);
        if(saved === 'true') cb.checked = true;
        cb.addEventListener('change',()=>{
          localStorage.setItem(key, cb.checked);
        });
        li.appendChild(cb);
        li.appendChild(document.createTextNode(item));
        ul.appendChild(li);
      });
      sec.appendChild(ul);
      const resetBtn = document.createElement('button');
      resetBtn.textContent = 'Reset Today';
      resetBtn.addEventListener('click',()=>{
        section.items.forEach((_,i)=>{
          const key = today + '_cb_' + section.title + '_' + i;
          localStorage.setItem(key,false);
          const cb = ul.children[i].querySelector('input');
          if(cb) cb.checked = false;
        });
      });
      sec.appendChild(resetBtn);
      mainContent.appendChild(sec);
    });
  </script>
</body>
</html>
